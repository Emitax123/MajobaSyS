{% extends 'base.html' %}
{% load static %}
{% block content %}

  <div class="e400-page">

    <div class="e400-card">

      <!-- Icono animado: triángulo de advertencia -->
      <div class="e400-icon-wrap">
        <div class="e400-icon-ring"></div>
        <div class="e400-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <!-- Triángulo de advertencia -->
            <path d="M32 8 L58 54 L6 54 Z"
                  stroke="#d81d26" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- Línea vertical del signo de exclamación -->
            <line x1="32" y1="24" x2="32" y2="40" stroke="#d81d26" stroke-width="3.5" stroke-linecap="round"/>
            <!-- Punto del signo de exclamación -->
            <circle cx="32" cy="47" r="2.5" fill="#d81d26"/>
          </svg>
        </div>
      </div>

      <!-- Badge y textos -->
      <div class="e400-badge">400</div>
      <h1 class="e400-title">Solicitud incorrecta</h1>
      <p class="e400-subtitle">
        El servidor no pudo procesar la solicitud.<br>
        Por favor intentá de nuevo.
      </p>

      <!-- Separador decorativo -->
      <div class="e400-divider">
        <span></span><span></span><span></span>
      </div>

      <!-- Mensaje secundario -->
      <p class="e400-message">
        Si el problema persiste, contactanos a
        <a href="mailto:majobacastelli1999@gmail.com">majobacastelli1999@gmail.com</a>
      </p>

      <!-- Botones de acción -->
      <div class="e400-actions">
        <a href="/" class="red-btn e400-btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Volver al Inicio
        </a>
        <button onclick="window.location.reload()" class="e400-btn-secondary" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Recargar página
        </button>
      </div>

    </div>

  </div>

  <style>
    .e400-page {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3em 1.5em;
    }

    .e400-card {
      background: #fff;
      border-radius: 20px;
      padding: 3.5em 3em;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      border-top: 5px solid #d81d26;
      animation: e400-fadein 0.5s ease both;
    }

    @keyframes e400-fadein {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Icono */
    .e400-icon-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 1.8em;
    }

    .e400-icon-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(216, 29, 38, 0.15);
      animation: e400-pulse 2.4s ease-in-out infinite;
    }

    @keyframes e400-pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.12); opacity: 0.5; }
    }

    .e400-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .e400-icon svg {
      width: 64px;
      height: 64px;
      /* Animación del triángulo: vibración de advertencia */
      animation: e400-warn 0.4s ease 0.6s both;
    }

    @keyframes e400-warn {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.12); }
      60%  { transform: scale(0.95); }
      80%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    /* Badge */
    .e400-badge {
      display: inline-block;
      background: rgba(216, 29, 38, 0.08);
      color: #d81d26;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35em 1em;
      border-radius: 20px;
      border: 1px solid rgba(216, 29, 38, 0.2);
      margin-bottom: 0.9em;
    }

    /* Título */
    .e400-title {
      font-size: 2.4rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 0.5em;
      letter-spacing: -0.02em;
    }

    .e400-subtitle {
      color: #666;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 1.8em;
    }

    /* Separador de puntos */
    .e400-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 1.8em;
    }

    .e400-divider span {
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d81d26;
      opacity: 0.35;
    }

    .e400-divider span:nth-child(2) {
      opacity: 0.65;
      width: 8px;
      height: 8px;
    }

    /* Mensaje con email */
    .e400-message {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2em;
    }

    .e400-message a {
      color: #d81d26;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .e400-message a:hover {
      color: #a8141b;
    }

    /* Botones */
    .e400-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75em;
      flex-wrap: wrap;
    }

    .e400-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      padding: 0.75em 1.8em;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .e400-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(216, 29, 38, 0.35);
    }

    .e400-btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      padding: 0.75em 1.8em;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      background: transparent;
      border: 2px solid #d81d26;
      color: #d81d26;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .e400-btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(216, 29, 38, 0.06);
      color: #a8141b;
      border-color: #a8141b;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .e400-card {
        padding: 2.5em 1.5em;
      }

      .e400-title {
        font-size: 1.9rem;
      }

      .e400-subtitle {
        font-size: 1rem;
      }

      .e400-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .e400-btn-primary,
      .e400-btn-secondary {
        justify-content: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .e400-card     { animation: none; }
      .e400-icon-ring  { animation: none; }
      .e400-icon svg   { animation: none; }
      .e400-btn-primary:hover,
      .e400-btn-secondary:hover { transform: none; }
    }
  </style>

{% endblock %}
