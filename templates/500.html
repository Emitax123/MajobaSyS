{% extends 'base.html' %}
{% load static %}
{% block content %}

  <div class="e500-page">

    <div class="e500-card">

      <!-- Icono animado: rayo/bolt -->
      <div class="e500-icon-wrap">
        <div class="e500-icon-ring"></div>
        <div class="e500-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <!-- Rayo/bolt -->
            <polyline
              points="36 8 20 34 30 34 28 56 44 30 34 30 36 8"
              stroke="#d81d26" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- Destellos pequeños alrededor -->
            <line x1="48" y1="14" x2="52" y2="10" stroke="#d81d26" stroke-width="2" stroke-linecap="round"/>
            <line x1="52" y1="18" x2="57" y2="18" stroke="#d81d26" stroke-width="2" stroke-linecap="round"/>
            <line x1="50" y1="24" x2="55" y2="26" stroke="#d81d26" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="26" x2="7"  y2="22" stroke="#d81d26" stroke-width="2" stroke-linecap="round"/>
            <line x1="10" y1="32" x2="5"  y2="32" stroke="#d81d26" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <!-- Badge y textos -->
      <div class="e500-badge">500</div>
      <h1 class="e500-title">Algo salió mal</h1>
      <p class="e500-subtitle">
        Ocurrió un error en el servidor.<br>
        Ya estamos trabajando para resolverlo.
      </p>

      <!-- Separador decorativo -->
      <div class="e500-divider">
        <span></span><span></span><span></span>
      </div>

      <!-- Mensaje secundario -->
      <p class="e500-message">
        Si el problema persiste, contactanos a
        <a href="mailto:majobacastelli1999@gmail.com">majobacastelli1999@gmail.com</a>
      </p>

      <!-- Botón de acción — href hardcodeado, sin {% url %} -->
      <a href="/" class="red-btn e500-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver al Inicio
      </a>

    </div>

  </div>

  <style>
    .e500-page {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3em 1.5em;
    }

    .e500-card {
      background: #fff;
      border-radius: 20px;
      padding: 3.5em 3em;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      border-top: 5px solid #d81d26;
      animation: e500-fadein 0.5s ease both;
    }

    @keyframes e500-fadein {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Icono */
    .e500-icon-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 1.8em;
    }

    .e500-icon-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(216, 29, 38, 0.15);
      animation: e500-pulse 2.4s ease-in-out infinite;
    }

    @keyframes e500-pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.12); opacity: 0.5; }
    }

    .e500-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .e500-icon svg {
      width: 64px;
      height: 64px;
      /* Animación del rayo: parpadeo sutil */
      animation: e500-flicker 3s ease-in-out infinite;
    }

    @keyframes e500-flicker {
      0%, 100% { opacity: 1; }
      45%       { opacity: 1; }
      50%       { opacity: 0.4; }
      55%       { opacity: 1; }
      60%       { opacity: 0.6; }
      65%       { opacity: 1; }
    }

    /* Badge */
    .e500-badge {
      display: inline-block;
      background: rgba(216, 29, 38, 0.08);
      color: #d81d26;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35em 1em;
      border-radius: 20px;
      border: 1px solid rgba(216, 29, 38, 0.2);
      margin-bottom: 0.9em;
    }

    /* Título */
    .e500-title {
      font-size: 2.4rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 0.5em;
      letter-spacing: -0.02em;
    }

    .e500-subtitle {
      color: #666;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 1.8em;
    }

    /* Separador de puntos */
    .e500-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 1.8em;
    }

    .e500-divider span {
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d81d26;
      opacity: 0.35;
    }

    .e500-divider span:nth-child(2) {
      opacity: 0.65;
      width: 8px;
      height: 8px;
    }

    /* Mensaje con email */
    .e500-message {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2em;
    }

    .e500-message a {
      color: #d81d26;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .e500-message a:hover {
      color: #a8141b;
    }

    /* Botón */
    .e500-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      padding: 0.75em 1.8em;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .e500-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(216, 29, 38, 0.35);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .e500-card {
        padding: 2.5em 1.5em;
      }

      .e500-title {
        font-size: 1.9rem;
      }

      .e500-subtitle {
        font-size: 1rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .e500-card    { animation: none; }
      .e500-icon-ring { animation: none; }
      .e500-icon svg  { animation: none; }
      .e500-btn:hover { transform: none; }
    }
  </style>

{% endblock %}
